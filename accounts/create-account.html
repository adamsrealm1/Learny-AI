<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create account - Learny AI</title>
    <link rel="stylesheet" href="../web/styles.css?v=accounts">
    <link rel="stylesheet" href="../web/accounts.css?v=accounts">
  </head>
  <body class="account-page" data-account-page="create-account">
    <div class="star-field" id="starField" aria-hidden="true"></div>
    <main class="account-shell auth-shell">
      <nav class="account-nav" aria-label="Account navigation">
        <a class="brand-link" href="/">
          <span class="brand-mark" aria-hidden="true">L</span>
          <span>Learny AI</span>
        </a>
        <div class="account-nav-actions">
          <a href="/myaccount">My account</a>
          <a href="/sign-in">Sign in</a>
        </div>
      </nav>

      <section class="auth-layout">
        <article class="auth-copy">
          <p class="account-kicker">New account</p>
          <h1>Give Learny a home for your chats.</h1>
          <p>
            Accounts keep usernames, secure password hashes, sessions, chats, and messages in the
            Python SQLite database.
          </p>
        </article>

        <form class="account-card auth-card" id="createAccountForm">
          <p class="eyebrow">Create account</p>
          <h2>Start syncing</h2>
          <label>
            <span>Username</span>
            <input name="username" type="text" autocomplete="username" minlength="3" maxlength="24" required>
          </label>
          <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <button class="primary-account-action full-width" type="submit">Create account</button>
          <p class="form-note" id="formMessage" aria-live="polite"></p>
          <p class="switch-auth">Already have one? <a href="/sign-in">Sign in</a></p>
        </form>
      </section>
    </main>
    <script src="../web/accounts.js?v=accounts" defer></script>
  </body>
</html>
