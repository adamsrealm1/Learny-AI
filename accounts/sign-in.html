<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in - Learny AI</title>
    <link rel="stylesheet" href="../web/styles.css?v=accounts">
    <link rel="stylesheet" href="../web/accounts.css?v=accounts">
  </head>
  <body class="account-page" data-account-page="sign-in">
    <div class="star-field" id="starField" aria-hidden="true"></div>
    <main class="account-shell auth-shell">
      <nav class="account-nav" aria-label="Account navigation">
        <a class="brand-link" href="/">
          <span class="brand-mark" aria-hidden="true">L</span>
          <span>Learny AI</span>
        </a>
        <div class="account-nav-actions">
          <a href="/myaccount">My account</a>
          <a href="/create-account">Create account</a>
        </div>
      </nav>

      <section class="auth-layout">
        <article class="auth-copy">
          <p class="account-kicker">Welcome back</p>
          <h1>Pick up every Learny chat where you left it.</h1>
          <p>
            Signing in connects the polished chat UI to Learny's SQLite account storage.
          </p>
        </article>

        <form class="account-card auth-card" id="signInForm">
          <p class="eyebrow">Sign in</p>
          <h2>Enter your account</h2>
          <label>
            <span>Username</span>
            <input name="username" type="text" autocomplete="username" minlength="3" maxlength="24" required>
          </label>
          <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="current-password" minlength="8" required>
          </label>
          <button class="primary-account-action full-width" type="submit">Sign in</button>
          <p class="form-note" id="formMessage" aria-live="polite"></p>
          <p class="switch-auth">No account yet? <a href="/create-account">Create one</a></p>
        </form>
      </section>
    </main>
    <script src="../web/accounts.js?v=accounts" defer></script>
  </body>
</html>
