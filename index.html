<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Learny AI</title>
    <link rel="stylesheet" href="./web/styles.css?v=linebubble">
  </head>
  <body>
    <div class="app-shell">
      <div class="star-field" id="starField" aria-hidden="true"></div>

      <aside class="sidebar" id="sidebar" aria-label="Learny navigation">
        <header class="sidebar-header">
          <strong>Learny AI</strong>
          <button class="sidebar-toggle" type="button" title="Collapse sidebar">
            <img class="ui-icon collapse-icon" src="./icon_library/collapse.png" alt="" aria-hidden="true">
            <span class="sr-only">Collapse sidebar</span>
          </button>
        </header>

        <section class="chats-panel" aria-label="Saved chats">
          <div class="panel-heading">
            <p>CHATS</p>
            <button class="add-chat-button" id="addChatButton" type="button" title="New chat">
              <img class="ui-icon new-chat-icon" src="./icon_library/new.png" alt="" aria-hidden="true">
              <span class="sr-only">New chat</span>
            </button>
          </div>
          <label class="chat-search" for="chatSearchInput">
            <img class="ui-icon chat-search-icon" src="./icon_library/search.png" alt="" aria-hidden="true">
            <input
              id="chatSearchInput"
              type="search"
              autocomplete="off"
              spellcheck="false"
              placeholder="Search chats"
            >
          </label>
          <div class="chat-list" id="chatList"></div>
        </section>

      </aside>
      <button class="sidebar-scrim" id="sidebarScrim" type="button" aria-label="Close sidebar"></button>

      <main class="main-area">
        <header class="top-bar">
          <button class="mobile-sidebar-button" id="mobileSidebarButton" type="button" title="Open sidebar">
            <img class="ui-icon mobile-sidebar-icon" src="./icon_library/collapse.png" alt="" aria-hidden="true">
            <span class="sr-only">Open sidebar</span>
          </button>
          <label class="message-search" for="messageSearchInput">
            <img class="ui-icon message-search-icon" src="./icon_library/search.png" alt="" aria-hidden="true">
            <input
              id="messageSearchInput"
              type="search"
              autocomplete="off"
              spellcheck="false"
              placeholder="Search this chat"
            >
            <span class="message-search-count" id="messageSearchCount" aria-live="polite"></span>
          </label>
          <div class="connection-pill" id="connectionPill">
            <span></span>
            <strong>Checking server status...</strong>
          </div>
        </header>

        <section class="chat-panel" aria-label="Learny chat">
          <div class="chat-log" id="chatLog" aria-live="polite">
            <div class="empty-state" id="emptyState">
              <h1 id="welcomeHeading">Hey! I'm Learny!</h1>
            </div>
          </div>

          <div class="composer-zone">
            <form class="composer" id="chatForm">
              <input
                id="messageInput"
                name="message"
                type="text"
                autocomplete="off"
                placeholder="Ask anything"
                maxlength="1200"
                required
              >
              <button class="send-button" id="sendButton" type="submit" title="Send message">
                <img class="ui-icon send-icon" src="./icon_library/send.png" alt="" aria-hidden="true">
                <span class="sr-only">Send message</span>
              </button>
            </form>

          </div>
        </section>
      </main>
    </div>

    <template id="messageTemplate">
      <article class="message">
        <div class="message-meta">
          <span class="speaker"></span>
          <span class="source"></span>
        </div>
        <div class="bubble"></div>
      </article>
    </template>

    <script src="./web/markdown.js?v=linebubble" defer></script>
    <script src="./web/app.js?v=linebubble" defer></script>
  </body>
</html>
