[package]
name = "adamsrealm1/learny-ai"
version = "0.2.5"
description = "Learny AI web app with a Python Groq backend and animated HTML/CSS/JS frontend."
license = "MIT"
readme = "README.md"
wasmer-extra-flags = "--net --http-client"

[dependencies]
"python/python" = "*"

[fs]
"/app" = "."
"/src" = "./src"
"/learny" = "./learny"
"/web" = "./web"
"/vendor" = "./vendor"

[[command]]
name = "script"
module = "python/python:python"
runner = "wasi"

[command.annotations.wasi]
main-args = ["/src/main.py"]
