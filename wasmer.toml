[package]
name = "adamsrealm1/learny-ai"
version = "0.2.5"
description = "Learny AI"
license = "MIT"
readme = "app/README.md"
wasmer-extra-flags = "--net --http-client"

[dependencies]
"python/python" = "*"

[fs]
"/site" = "."
"/app" = "./app"
"/src" = "./app/src"
"/learny" = "./app/learny"
"/web" = "./app/web"
"/vendor" = "./app/vendor"

[[command]]
name = "script"
module = "python/python:python"
runner = "wasi"

[command.annotations.wasi]
main-args = ["/src/main.py"]
