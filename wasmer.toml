[package]
name = "adamsrealm1/learny-ai"
version = "0.1.1"
description = "Learny AI web app with a Python JSON brain and animated HTML/CSS/JS frontend."
license = "MIT"
readme = "README.md"

[dependencies]
"wasmer/python" = "^3.12.6"

[fs]
"/src" = "./src"
"/learny" = "./learny"
"/web" = "./web"
"/data" = "./data"

[[command]]
name = "script"
module = "wasmer/python:python"
runner = "wasi"

[command.annotations.wasi]
main-args = ["/src/main.py"]
